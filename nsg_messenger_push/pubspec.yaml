name: nsg_messenger_push
description: >
  Production-ready push token provider для NSG Connect SDK
  (`nsg_messenger`). Тонкая обёртка над `firebase_messaging` —
  реализует `PushTokenProvider` interface из core SDK.
  Отдельный package, чтобы pure-Dart `nsg_messenger` core не тащил
  native plugin (web/embed-only customer без push не нуждается).
publish_to: 'none' # Internal monorepo package; не публикуется в pub.dev.
version: 0.1.0

environment:
  sdk: ^3.11.4
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  # Core SDK — provides PushTokenProvider abstract class и DeviceInfo.
  nsg_messenger:
    path: ../nsg_messenger

  # TASK20-Phase2 Chunk 5: Firebase Cloud Messaging (variant a — FCM
  # wraps APNs on iOS path). firebase_core — required peer для
  # firebase_messaging (host-app должен вызвать `Firebase.
  # initializeApp()` в `main()` ДО `FirebasePushTokenProvider.create()`).
  #
  # **TASK71**: диапазон, а не пин. Первый embedded-хост (Futbolista)
  # держит firebase_core 4.x ради firebase_analytics 12.x (тот требует
  # core 4.x), и обойти это нельзя даже при доставке пушей через
  # nsg-connect. Chatista/Titan остаются на проверенных 3.x/15.x — pub
  # сам выберет согласованную пару под каждый хост. Наш фактический usage
  # (getToken / onTokenRefresh / requestPermission / onBackgroundMessage /
  # onMessageOpenedApp / RemoteMessage.data / getAPNSToken) стабилен на
  # обоих краях; прямого firebase_core API у пакета нет вовсе — core
  # только peer для host-овского Firebase.initializeApp(). Матрица
  # совместимости — в README.
  firebase_core: ">=3.6.0 <5.0.0"
  firebase_messaging: ">=15.1.3 <17.0.0"
  # package_info_plus / device_info_plus — для DeviceInfo population.
  package_info_plus: ^8.1.0
  device_info_plus: ^11.1.0

  # TASK61: RuStore Push (VKPNS) — альтернативный провайдер для Android
  # без Google Play Services (Android-only plugin, на остальных
  # платформах не линкуется). Выбор провайдера — resolvePushService().
  flutter_rustore_push: ^7.2.0
  # Детект Google Play Services на Android (fcm vs rustore).
  google_api_availability: ^5.0.1

  # TASK46 (звонки в фоне): нативный полноэкранный входящий звонок.
  # На Android — full-screen-intent + foreground-service (звонит даже
  # когда приложение убито); на iOS — CallKit (но там нужен PushKit VoIP-
  # push, не FCM — см. docs/ios-voip-scaffold.md). Вызывается из FCM
  # background isolate (nsgMessengerBackgroundHandler) и из host-app.
  flutter_callkit_incoming: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false
